name: Deploy to Github Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga tu código
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. Configura Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      # 3. Sube TODOS tus archivos (incluye index.html, CSS, JS...)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # El punto significa "todo el repositorio"
      
      # 4. Publica en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
