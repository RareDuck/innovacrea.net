<head>
  <meta charset="UTF-8">
  <title>DIBUJANDING</title>
</head>

<body style="background:black">
    <div id="ficha" style="position:absolute; width:50px; height:50px; left:100px; top:100px; background:white; cursor:none"></div>

  <script>
    const pieza = document.getElementById("ficha")
    let x , y, drag = false

    // Agarrar la pieza
    document.addEventListener("mousemove", (e) => {
      pieza.style.top = (e.clientY - 25) + "px"
      pieza.style.left = (e.clientX - 25) + "px"

      pieza.style.width = (e.clientX / 4) + "px"
      pieza.style.height = (e.clientY / 4) + "px"
    })
  </script>
</body>
