<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <title>OTRA PRUEBA</title>
  </head>

  <body>
    <h1 id="num" style="color:yellow">0</h1>
    <button onclick="suma('num')">SUMA</button>
    <button onclick="resta('num')">RESTA</button>
    <button onclick="cero('num')">RESET</button>
    
    <script>
      function suma(id) {
        let a = document.getElementById(id).textContent
        document.getElementById(id).textContent = Number(a) + 1
        if (a + 1 < 0) {
          document.getElementById(id).style.color = "red"
        }
        else if (a + 1 > 0) {
          document.getElementById(id).style.color = "green"
        }
        else {
          document.getElementById(id).style.color = "black"
        }   
      }

      function resta(id) {
        let a = Number(document.getElementById(id).textContent)
        document.getElementById(id).textContent = a - 1        
        if (a - 1 < 0) {
          document.getElementById(id).style.color = "red"
        }
        else if (a - 1 > 0) {
          document.getElementById(id).style.color = "green"
        }
        else {
          document.getElementById(id).style.color = "black"
        }      
      }

      function cero(id) {
        document.getElementById(id).textContent = "0"
        document.getElementById(id).style.color = "black"
      }
    </script>
  </body>
